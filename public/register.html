<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register — Lost & Found</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
</head>

<body data-page="register">

<header>
    <h1>Campus Lost & Found Management System</h1>
</header>

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="logo">Lost & Found</a>
        <div class="nav-links">
            <a href="index.html" data-page="home">Home</a>
            <a href="lost.html" data-page="lost">Lost</a>
            <a href="found.html" data-page="found">Found</a>
            <a href="login.html" data-page="login">Login</a>
        </div>
    </div>
</nav>

<main>
<div class="form-container">
    <h2>Create Account</h2>
    <p style="text-align:center; color:var(--muted); margin-bottom:24px; font-size:14px;">
        Only <strong>@quest.edu.my</strong> email addresses are accepted
    </p>

    <form id="registerForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <input type="text" id="name" name="name" placeholder="e.g. Ahmad bin Ali" required>
        </div>

        <div class="form-group">
            <label for="email">University Email</label>
            <input type="email" id="email" name="email" placeholder="e.g. student@quest.edu.my" required>
            <small class="field-hint">💡 Must be a @quest.edu.my email address</small>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required>
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your password" required>
        </div>

        <button type="submit" class="primary-btn" id="registerBtn">Create Account</button>

        <p style="text-align:center; margin-top:16px; font-size:14px; color:var(--muted);">
            Already have an account? <a href="login.html" style="color:var(--blue); font-weight:600;">Login here</a>
        </p>
    </form>

    <div id="errorMessage" style="margin-top:14px; color:red; font-weight:600; text-align:center;"></div>
    <div id="successMessage" style="margin-top:14px; color:green; font-weight:600; text-align:center;"></div>
</div>
</main>

<footer>
    <p>© 2026 Quest International University</p>
</footer>

<script>
document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const btn = document.getElementById("registerBtn");
    const errorMsg = document.getElementById("errorMessage");
    const successMsg = document.getElementById("successMessage");

    errorMsg.textContent = "";
    successMsg.textContent = "";

    const email = document.getElementById("email").value.trim();

    // Client-side email domain check
    if (!email.toLowerCase().endsWith("@quest.edu.my")) {
        errorMsg.textContent = "❌ Only @quest.edu.my email addresses are allowed.";
        return;
    }

    btn.disabled = true;
    btn.textContent = "Creating account...";

    const formData = {
        name: document.getElementById("name").value.trim(),
        email: email,
        password: document.getElementById("password").value,
        confirm_password: document.getElementById("confirm_password").value
    };

    try {
        const res = await fetch("/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(formData)
        });

        const data = await res.json();

        if (res.ok) {
            successMsg.textContent = "✅ " + data.message;
            setTimeout(() => window.location.href = "login.html", 1500);
        } else {
            errorMsg.textContent = "❌ " + data.error;
        }
    } catch (err) {
        errorMsg.textContent = "❌ Cannot connect to server.";
    }

    btn.disabled = false;
    btn.textContent = "Create Account";
});
</script>

</body>
</html>
